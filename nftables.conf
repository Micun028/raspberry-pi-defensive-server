#!/usr/sbin/nft -f
#
# /etc/nftables.conf
# Host firewall for the Raspberry Pi defensive server.
# Default-deny inbound; allow only the services this box provides.
# Adjust the LAN subnet (192.168.1.0/24) to match your network.

flush ruleset

define LAN = 192.168.1.0/24

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback + established/related
        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        # ICMP (ping / diagnostics)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # SSH — restrict to LAN only (use the VPN for remote admin)
        ip saddr $LAN tcp dport 22 accept

        # DNS (Pi-hole) from the LAN
        ip saddr $LAN udp dport 53 accept
        ip saddr $LAN tcp dport 53 accept

        # Pi-hole web admin from the LAN
        ip saddr $LAN tcp dport { 80, 443 } accept

        # WireGuard (from anywhere — this is the remote-access entry point)
        udp dport 51820 accept

        # Grafana dashboard from the LAN
        ip saddr $LAN tcp dport 3000 accept

        # Wazuh agent <-> manager (open only if THIS host is the manager)
        # ip saddr $LAN tcp dport { 1514, 1515 } accept

        # Everything else is dropped by policy.
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
        # WireGuard handles its own forward/NAT rules via PostUp.
        ct state established,related accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
