server:
    # Listen on localhost, dedicated port for Pi-hole to use as upstream.
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # IPv6 off unless you use it.
    do-ip6: no

    # Use the root hints so Unbound resolves recursively (no third-party
    # upstream resolver — your queries do not go to a public DNS provider).
    root-hints: "/var/lib/unbound/root.hints"

    # Trust the DNSSEC root anchor (managed by unbound-anchor).
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Privacy / hardening
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes
    use-caps-for-id: no
    qname-minimisation: yes
    prefetch: yes
    prefetch-key: yes
    aggressive-nsec: yes
    hide-identity: yes
    hide-version: yes

    # Performance / cache
    edns-buffer-size: 1232
    cache-min-ttl: 300
    cache-max-ttl: 86400
    msg-cache-size: 50m
    rrset-cache-size: 100m

    # Only allow queries from the local machine (Pi-hole talks to it locally).
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0 refuse

    # Do not answer queries for private ranges from upstream (rebind protection).
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10
